<div class="page-header">

    <div>

        <h2 class="page-title">
            {{ title }}
        </h2>

        <div class="page-subtitle">
            {{ subtitle }}
        </div>

    </div>

    {% if button_text %}
        <a href="{{ button_url }}"
           class="btn btn-primary">

            <i class="bi bi-plus-lg"></i>
            {{ button_text }}

        </a>
    {% endif %}

</div>
